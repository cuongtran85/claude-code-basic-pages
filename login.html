<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Google Fonts: Poppins and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.379.0/dist/umd/lucide.js"></script>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ===== CSS VARIABLES ===== */
        :root {
            --bg-base: #090A14;
            --bg-card: #1f2937;
            --primary: #DF6B33;
            --primary-hover: #c55a2a;
            --border: #374151;
            --input-bg: #374151;
            --input-border: #4b5563;
            --text-white: #ffffff;
            --text-gray: #9ca3af;
            --text-muted: #6b7280;
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        /* ===== BODY ===== */
        body {
            background-color: var(--bg-base);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* ===== CARD ===== */
        .card {
            width: 100%;
            max-width: 28rem;
            background-color: var(--bg-card);
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            padding: 2rem;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            color: var(--text-gray);
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-gray);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 0.375rem;
            color: var(--text-white);
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(223, 107, 51, 0.3);
        }

        /* ===== CHECKBOX ROW ===== */
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-gray);
            cursor: pointer;
        }

        .checkbox-input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .link {
            font-size: 0.875rem;
            color: var(--primary);
            text-decoration: none;
            transition: color 0.15s;
        }

        .link:hover {
            color: var(--primary-hover);
        }

        /* ===== BUTTONS ===== */
        .btn {
            width: 100%;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background-color 0.15s;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--text-white);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-primary:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(223, 107, 51, 0.4);
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            background-color: transparent;
            color: var(--text-gray);
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .btn-social:hover {
            background-color: #374151;
        }

        .btn-social svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        /* ===== DIVIDER ===== */
        .divider {
            position: relative;
            margin: 1.5rem 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            border-top: 1px solid var(--border);
            transform: translateY(-50%);
        }

        .divider-text {
            position: relative;
            display: flex;
            justify-content: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .divider-text span {
            padding: 0 0.5rem;
            background-color: var(--bg-card);
            position: relative;
        }

        /* ===== SOCIAL GRID ===== */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        /* ===== ACCESSIBILITY ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }

            .social-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5rem;
            }

            .form-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 1rem;
            }

            .card-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1 class="card-title">Welcome Back</h1>
            <p class="card-subtitle">Sign in to your account</p>
        </div>
        <form>
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" required class="form-input" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" required class="form-input" placeholder="Your password">
            </div>
            <div class="form-group form-row">
                <label class="checkbox-label">
                    <input id="remember" name="remember" type="checkbox" class="checkbox-input">
                    Remember me
                </label>
                <a href="#" class="link">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <div class="divider">
            <div class="divider-text"><span>Or continue with</span></div>
        </div>
        <div class="social-grid">
            <button class="btn-social" aria-label="Sign in with Google">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span class="sr-only">Sign in with Google</span>
            </button>
            <button class="btn-social" aria-label="Sign in with GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                </svg>
                <span class="sr-only">Sign in with GitHub</span>
            </button>
            <button class="btn-social" aria-label="Sign in with Facebook">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                <span class="sr-only">Sign in with Facebook</span>
            </button>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
    <div class="card-footer">
        Don't have an account? <a href="register.html">Sign up</a>
    </div>
</body>
</html>
