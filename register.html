<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <!-- Google Fonts: Poppins and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.379.0/dist/umd/lucide.js"></script>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ===== CSS VARIABLES ===== */
        :root {
            --bg-base: #090A14;
            --bg-card: #1f2937;
            --primary: #DF6B33;
            --primary-hover: #c55a2a;
            --border: #374151;
            --input-bg: #374151;
            --input-border: #4b5563;
            --text-white: #ffffff;
            --text-gray: #9ca3af;
            --text-muted: #6b7280;
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Inter', sans-serif;
            --error: #ef4444;
        }

        /* ===== BODY ===== */
        body {
            background-color: var(--bg-base);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* ===== CARD ===== */
        .card {
            width: 100%;
            max-width: 28rem;
            background-color: var(--bg-card);
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            padding: 2rem;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
        }

        .card-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            color: var(--text-gray);
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-gray);
            margin-bottom: 0.5rem;
        }

        .form-label .optional {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 0.375rem;
            color: var(--text-white);
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(223, 107, 51, 0.3);
        }

        .form-input.error,
        .form-select.error {
            border-color: var(--error);
        }

        .form-error {
            display: none;
            font-size: 0.75rem;
            color: var(--error);
            margin-top: 0.25rem;
        }

        .form-error.visible {
            display: block;
        }

        /* ===== CHECKBOX ===== */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .checkbox-input {
            width: 1rem;
            height: 1rem;
            accent-color: var(--primary);
            cursor: pointer;
            margin-top: 0.15rem;
            flex-shrink: 0;
        }

        .checkbox-label {
            font-size: 0.875rem;
            color: var(--text-gray);
            cursor: pointer;
            line-height: 1.4;
        }

        .checkbox-label a {
            color: var(--primary);
            text-decoration: none;
        }

        .checkbox-label a:hover {
            color: var(--primary-hover);
        }

        /* ===== BUTTONS ===== */
        .btn {
            width: 100%;
            padding: 0.625rem 1rem;
            border-radius: 0.375rem;
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background-color 0.15s;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--text-white);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-primary:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(223, 107, 51, 0.4);
        }

        /* ===== FOOTER ===== */
        .card-footer {
            text-align: center;
            margin-top: 1.25rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
            font-size: 0.875rem;
            color: var(--text-gray);
        }

        .card-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .card-footer a:hover {
            color: var(--primary-hover);
        }

        /* ===== ACCESSIBILITY ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 1rem;
            }

            .card-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1 class="card-title">Create Account</h1>
            <p class="card-subtitle">Join us and get started</p>
        </div>
        <form id="registerForm" novalidate>
            <div class="form-row">
                <div class="form-group">
                    <label for="fullname" class="form-label">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required class="form-input" placeholder="John Doe" autocomplete="name">
                    <p class="form-error" id="fullnameError">Full name is required.</p>
                </div>
                <div class="form-group">
                    <label for="phone" class="form-label">Phone <span class="optional">(optional)</span></label>
                    <input type="tel" id="phone" name="phone" class="form-input" placeholder="0123456789" maxlength="10" autocomplete="tel">
                    <p class="form-error" id="phoneError">Enter a valid 10-digit phone number.</p>
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" required class="form-input" placeholder="you@example.com" autocomplete="email">
                <p class="form-error" id="emailError">Please enter a valid email address.</p>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" required class="form-input" placeholder="Min. 8 characters" autocomplete="new-password">
                    <p class="form-error" id="passwordError">Password must be at least 8 characters.</p>
                </div>
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required class="form-input" placeholder="Re-enter password" autocomplete="new-password">
                    <p class="form-error" id="confirmPasswordError">Passwords do not match.</p>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="gender" class="form-label">Gender <span class="optional">(optional)</span></label>
                    <select id="gender" name="gender" class="form-select">
                        <option value="">Select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="address" class="form-label">Address <span class="optional">(optional)</span></label>
                    <input type="text" id="address" name="address" class="form-input" placeholder="123 Main St" autocomplete="street-address">
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required class="checkbox-input">
                <label for="terms" class="checkbox-label">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>
            <p class="form-error" id="termsError" style="margin-bottom: 0.75rem;">You must agree to the terms to continue.</p>

            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <div class="card-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>
    <script>
        lucide.createIcons();

        const form = document.getElementById('registerForm');
        const phoneInput = document.getElementById('phone');

        phoneInput.addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
        });

        function showError(fieldId, show) {
            const errorEl = document.getElementById(fieldId + 'Error');
            const inputEl = document.getElementById(fieldId);
            if (show) {
                errorEl.classList.add('visible');
                inputEl.classList.add('error');
            } else {
                errorEl.classList.remove('visible');
                inputEl.classList.remove('error');
            }
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            let valid = true;

            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value;
            const terms = document.getElementById('terms').checked;

            showError('fullname', !fullname);
            if (!fullname) valid = false;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            showError('email', !emailRegex.test(email));
            if (!emailRegex.test(email)) valid = false;

            showError('password', password.length < 8);
            if (password.length < 8) valid = false;

            showError('confirmPassword', password !== confirmPassword || !confirmPassword);
            if (password !== confirmPassword || !confirmPassword) valid = false;

            if (phone && phone.length !== 10) {
                showError('phone', true);
                valid = false;
            } else {
                showError('phone', false);
            }

            const termsError = document.getElementById('termsError');
            if (!terms) {
                termsError.style.display = 'block';
                valid = false;
            } else {
                termsError.style.display = 'none';
            }

            if (valid) {
                form.reset();
                alert('Registration submitted successfully!');
            }
        });
    </script>
</body>
</html>
