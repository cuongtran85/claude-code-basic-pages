<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23DF6B33'/%3E%3Ctext x='50' y='68' font-size='55' font-weight='bold' fill='white' text-anchor='middle' font-family='sans-serif'%3EL%3C/text%3E%3C/svg%3E">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#090A14',
            primary: '#DF6B33',
            'primary-hover': '#C45A28',
            'surface': '#111827',
            'surface-light': '#1F2937',
            'border': '#374151',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #090A14;
    }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #111827 inset;
      -webkit-text-fill-color: #F9FAFB;
      transition: background-color 5000s ease-in-out 0s;
    }
    .social-btn:hover {
      background-color: #1F2937;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 font-inter text-gray-100">

  <div class="w-full max-w-sm">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background-color: #DF6B33;">
        <i data-lucide="lock-keyhole" class="w-7 h-7 text-white"></i>
      </div>
      <h1 class="font-poppins font-extrabold text-3xl text-white mb-1">Welcome Back</h1>
      <p class="font-inter text-sm text-gray-400">Sign in to continue</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl p-8" style="background-color: #111827; border: 1px solid #374151;">

      <!-- Email -->
      <div class="mb-4">
        <label class="block font-poppins font-semibold text-sm text-gray-200 mb-1.5" for="email">Email</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
            <i data-lucide="mail" class="w-4 h-4"></i>
          </span>
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            class="w-full pl-10 pr-4 py-2.5 rounded-xl text-sm font-inter text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-offset-0 transition-all"
            style="background-color: #1F2937; border: 1px solid #374151;"
            onfocus="this.style.borderColor='#DF6B33'; this.style.boxShadow='0 0 0 3px rgba(223,107,51,0.15)';"
            onblur="this.style.borderColor='#374151'; this.style.boxShadow='none';"
          >
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block font-poppins font-semibold text-sm text-gray-200 mb-1.5" for="password">Password</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
            <i data-lucide="key-round" class="w-4 h-4"></i>
          </span>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            class="w-full pl-10 pr-10 py-2.5 rounded-xl text-sm font-inter text-gray-100 placeholder-gray-500 focus:outline-none transition-all"
            style="background-color: #1F2937; border: 1px solid #374151;"
            onfocus="this.style.borderColor='#DF6B33'; this.style.boxShadow='0 0 0 3px rgba(223,107,51,0.15)';"
            onblur="this.style.borderColor='#374151'; this.style.boxShadow='none';"
          >
          <button
            type="button"
            id="togglePassword"
            class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200 transition-colors"
            onclick="togglePasswordVisibility()"
          >
            <i data-lucide="eye-off" id="eyeIcon" class="w-4 h-4"></i>
          </button>
        </div>
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between mb-6">
        <label class="flex items-center gap-2 cursor-pointer group">
          <div class="relative">
            <input type="checkbox" id="remember" class="sr-only peer">
            <div class="w-5 h-5 rounded-md peer-checked:bg-primary peer-checked:border-primary transition-all" style="background-color: #1F2937; border: 1px solid #374151;"></div>
            <svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="text-sm font-inter text-gray-400 group-hover:text-gray-200 transition-colors">Remember me</span>
        </label>
        <a href="#" class="text-sm font-inter text-primary hover:text-primary-hover transition-colors">Forgot password?</a>
      </div>

      <!-- Login Button -->
      <button
        type="button"
        class="w-full py-2.5 rounded-xl font-poppins font-bold text-sm text-white transition-all cursor-pointer"
        style="background-color: #DF6B33;"
        onmouseover="this.style.backgroundColor='#C45A28'; this.style.boxShadow='0 4px 20px rgba(223,107,51,0.35)';"
        onmouseout="this.style.backgroundColor='#DF6B33'; this.style.boxShadow='none';"
        onclick="this.style.transform='scale(0.98)'; setTimeout(()=>this.style.transform='scale(1)', 150);"
      >
        Sign In
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px" style="background-color: #374151;"></div>
        <span class="text-xs font-inter text-gray-500">or continue with</span>
        <div class="flex-1 h-px" style="background-color: #374151;"></div>
      </div>

      <!-- Social Login -->
      <div class="grid grid-cols-3 gap-2">
        <!-- Google -->
        <button class="social-btn flex items-center justify-center gap-2 py-2.5 rounded-xl border transition-all cursor-pointer" style="border-color: #374151;">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span class="hidden sm:inline text-sm font-inter text-gray-300">Google</span>
        </button>

        <!-- GitHub -->
        <button class="social-btn flex items-center justify-center gap-2 py-2.5 rounded-xl border transition-all cursor-pointer" style="border-color: #374151;">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          <span class="hidden sm:inline text-sm font-inter text-gray-300">GitHub</span>
        </button>

        <!-- Facebook -->
        <button class="social-btn flex items-center justify-center gap-2 py-2.5 rounded-xl border transition-all cursor-pointer" style="border-color: #374151;">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          <span class="hidden sm:inline text-sm font-inter text-gray-300">Facebook</span>
        </button>
      </div>

    </div>

    <!-- Sign Up Link -->
    <p class="text-center mt-6 font-inter text-sm text-gray-400">
      Don't have an account?
      <a href="register.html" class="font-semibold text-primary hover:text-primary-hover transition-colors">Create account</a>
    </p>

  </div>

  <script>
    lucide.createIcons();

    function togglePasswordVisibility() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye-off');
      }
      lucide.createIcons();
    }
  </script>

</body>
</html>
